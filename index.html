<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Princesa</title>
    <style>
        body {
            background-color: #ffc0cb; /* Rosa */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Alinea al principio para dar espacio */
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            padding-top: 20px; /* Espacio arriba */
        }

        /* Corazones flotantes */
        .corazon {
            position: absolute;
            color: red;
            font-size: 20px;
            animation: flotar 4s infinite ease-in;
            z-index: -1;
            opacity: 0;
        }

        @keyframes flotar {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* Ajuste para la foto vertical (588x1280) */
        #foto-centro {
            /* Mantenemos la proporción vertical pero ajustamos el tamaño para que quepa en pantalla */
            width: auto;
            height: 450px; /* Altura ajustada para que se vea bien en la mayoría de pantallas */
            max-width: 90%; /* Asegura que no se salga en pantallas pequeñas */
            
            border-radius: 15px; /* Bordes ligeramente redondeados */
            border: 8px solid white;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            object-fit: cover; /* Ajusta la imagen dentro del contenedor */
            margin-bottom: 20px;
            display: block;
        }

        #seccion-inicial {
            text-align: center;
            margin-top: 10px;
        }

        /* Caja de regalo blanca con listones rojos */
        #boton-regalo {
            width: 120px;
            height: 120px;
            background-color: white;
            position: relative;
            cursor: pointer;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            padding: 0; /* Quitamos padding por defecto del botón */
            overflow: hidden; /* Mantiene los listones dentro */
            display: inline-block;
        }

        #boton-regalo:hover {
            transform: scale(1.05);
        }

        /* Listones rojos de la caja */
        .liston-v {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 100%;
            background-color: red;
            z-index: 1;
        }

        .liston-h {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 100%;
            height: 20px;
            background-color: red;
            z-index: 1;
        }
        
        /* Texto del botón "Obtén tu regalo" */
        .texto-boton {
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #333;
            font-weight: bold;
            font-size: 12px;
            z-index: 2;
            background-color: rgba(255,255,255,0.7); /* Fondo semi-transparente para leer bien */
            padding: 2px 0;
        }

        #resultado {
            display: none;
            text-align: center;
            animation: aparecer 1s ease-out;
            margin-top: 20px;
            padding-bottom: 30px;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .ramo-flores {
            font-size: 120px; /* Flores bien grandes */
            margin: 10px 0;
        }

        .mensaje {
            color: #d63384;
            font-size: 26px;
            font-weight: bold;
            max-width: 90%;
            margin: 0 auto;
            line-height: 1.4;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <!-- Corazones de fondo (se generan automáticamente) -->
    <script>
        for (let i = 0; i < 40; i++) {
            let corazon = document.createElement('div');
            corazon.className = 'corazon';
            corazon.innerHTML = '❤';
            corazon.style.left = Math.random() * 100 + 'vw';
            corazon.style.top = (Math.random() * 100 + 10) + 'vh'; // Empiezan un poco más abajo
            corazon.style.animationDelay = (Math.random() * 4) + 's';
            corazon.style.fontSize = (Math.random() * 15 + 15) + 'px'; // Tamaños variados
            document.body.appendChild(corazon);
        }
    </script>

    <!-- FOTO VERTICAL: Cambia "tu-foto-vertical.jpg" por el nombre de tu archivo (ej: foto.jpg) -->
    <img id="foto-centro" src="d:\05042026\Sorpresa.html\WhatsApp Image 2026-04-30 at 00.54.50.jpeg" alt="Tu Foto">

    <div id="seccion-inicial">
        <!-- El botón es la caja de regalo misma -->
        <button id="boton-regalo" onclick="abrirRegalo()">
            <div class="liston-v"></div>
            <div class="liston-h"></div>
            <div class="texto-boton">Obtén tu regalo</div>
        </button>
    </div>

    <div id="resultado">
        <div class="ramo-flores">💐🌷🌹🌸</div>
        <div class="mensaje">
            Para mi princesa,<br>
            quiero que sepas que te quiero muchísimo ❤️
        </div>
    </div>

    <script>
        function abrirRegalo() {
            // Oculta la foto y el botón inicial
            document.getElementById('foto-centro').style.display = 'none';
            document.getElementById('seccion-inicial').style.display = 'none';
            // Muestra el ramo y el mensaje
            document.getElementById('resultado').style.display = 'block';
            // Cambia el fondo a un rosa más intenso para celebrar
            document.body.style.backgroundColor = "#ffb6c1";
        }
    </script>

</body>
</html>
